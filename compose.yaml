name: all

volumes:
  ai_path:
    driver: local
    driver_opts:
      type: none
      device: ${D_AI}
      o: bind, rw, uid=999,gid=999
  out_path:
    driver: local
    driver_opts:
      type: none
      device: ${D_OUT}
      o: bind, rw, uid=999,gid=999
  git:
    driver: local
    driver_opts:
      type: none
      device: ${D_GIT}
      o: bind, rw, uid=999,gid=999
  docker:
    driver: local
    driver_opts:
      type: none
      device: ${D_DKR}
      o: bind, rw, uid=999,gid=999

include:
  - path:
    - ${D_DKR:-.}/Containers/dev/compose/compose.yaml
   #- path:
    #- ${D_DKR:-.}/Containers/comfy/compose/compose.yaml
  - path:
    - ${D_DKR:-.}/Containers/ollama/compose/compose.yaml
  - path:
    - ${D_DKR:-.}/Containers/kali/compose/compose.yaml
